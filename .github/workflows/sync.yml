name: EFOY Data Sync
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install tools
        run: npm install
      - name: Run robot
        run: node sync.js
